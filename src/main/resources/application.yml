# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    key: 'sk-a3cab84eb91a479986d68a2fc4037bc3'  # 从环境变量读取或使用默认值（用于自定义配置）
  embedding:
    model: 'text-embedding-v4'  # 阿里云文本向量化模型

# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数

# RAG 配置
rag:
  top-k: 3  # 检索返回的最相似文档数量
  model: "qwen3-max"  # 大语言模型名称

# Prometheus 配置
prometheus:
  base-url: http://localhost:9090
  timeout: 10  # 超时时间（秒）
  mock-enabled: true  # 是否启用 Mock 模式（用于测试）

# CLS 云日志服务配置
cls:
  mock-enabled: false  # 是否启用 Mock 模式（用于测试，设为 true 返回与告警关联的模拟日志数据）

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false # 不自动转换成驼峰命名，数据库表中字段是什么就传过来什么
    # 仅在开发环境输出日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    enable-sql-runner: true # 开启SqlRunner配置
    db-config:
      logic-delete-field: isDeleted # 逻辑删除
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)

# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - org.example.controller
