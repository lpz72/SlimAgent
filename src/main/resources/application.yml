server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true


file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

# Spring AI Alibaba DashScope 配置
spring:
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://39.102.96.8:3306/slim_agent
    username: slim_agent
    password: lpz2003...

  # redis配置
  data:
    redis:
      database: 1
      host: 39.102.96.8
      port: 6379
      timeout: 10s
      password: lpz2003...
  # session配置
  session:
    store-type: redis
    # 30天过期
    timeout: 2592000

  ai:
    dashscope:
      api-key: 'sk-a3cab84eb91a479986d68a2fc4037bc3'  # 从环境变量读取或使用默认值
      chat:
        options:
          timeout: 180000  # 超时时间180秒（3分钟）
          model: "qwen3-max"
      embedding:
        options:
          model: 'text-embedding-v4'  # 阿里云文本向量化模型

      retry:
        max-attempts: 3  # 最大重试次数
        backoff:
          initial-interval: 2000  # 初始重试间隔2秒
          multiplier: 2  # 重试间隔倍数
          max-interval: 10000  # 最大重试间隔10秒

    # Spring AI MCP 客户端配置
    # 如果使用mock数据，请注释这部分内容

    mcp:
      client:
        enabled: true
        name: mcp-server
        version: 1.0.0
        request-timeout: 60s
        type: ASYNC
        sse:
          connections:
            server:
              # todo: 部署时改变
              url: http://localhost:9901


# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数

# RAG 配置
rag:
  top-k: 5  # 最终返回给生成层的数量
  model: "qwen3-max"  # 大语言模型名称
  hybrid:
    enabled: true
    vector-candidate-k: 20
    es-candidate-k: 20
    fusion-top-k: 20
    rrf-k: 60
    vector-weight: 1.0
    es-weight: 1.0
  es:
    enabled: true
    url: "http://39.102.96.8:9200"
    index: "rag_chunks"
    timeout-ms: 3000
  rerank:
    enabled: true  # 是否启用重排序模型
    model: "gte-rerank-v2"  # DashScope 文本重排序模型
    url: "https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank"
    timeout-ms: 15000
    top-k: 5


# chat 配置
chat:
  model: "qwen3-max"

# Prometheus 配置
prometheus:
  base-url: http://localhost:9090
  timeout: 10  # 超时时间（秒）
  mock-enabled: true  # 是否启用 Mock 模式（用于测试）

# CLS 云日志服务配置
cls:
  mock-enabled: false  # 是否启用 Mock 模式（用于测试，设为 true 返回与告警关联的模拟日志数据）

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false # 不自动转换成驼峰命名，数据库表中字段是什么就传过来什么
    # 仅在开发环境输出日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    enable-sql-runner: true # 开启SqlRunner配置
    db-config:
      logic-delete-field: isDeleted # 逻辑删除
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)

# 接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: org.example.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
